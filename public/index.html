<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todolists devOps</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('./images/bg-img.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 400px;
            height: fit-content;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        input {
            width: 75%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px;
            background: #027450;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            padding: 10px;
            background: #eee;
            margin-top: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>GOOOOOOOOOOOOOOOOOOOOOOOOOOO</h1>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="taskInput" placeholder="Nouvelle tâche...">
            <button id="addBtn">Ajouter</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script src="app.js"></script>
</body>

</html>
